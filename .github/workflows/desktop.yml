name: Desktop

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            binary: speedreading-app_core_desktop_iced
            artifact: readstr-linux
          - os: macos-latest
            name: macos
            binary: speedreading-app_core_desktop_iced
            artifact: readstr-macos
          - os: windows-latest
            name: windows
            binary: speedreading-app_core_desktop_iced.exe
            artifact: readstr-windows

    runs-on: ${{ matrix.os }}
    concurrency:
      group: desktop-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            pkg-config

      - name: Build desktop release
        run: cargo build -p speedreading-app_core_desktop_iced --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: target/release/${{ matrix.binary }}
          retention-days: 30

      - name: Attach binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/${{ matrix.binary }}
