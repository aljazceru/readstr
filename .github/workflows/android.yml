name: Android

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build host Rust (for uniffi-bindgen)
        run: cargo build -p speedreading-app_core --release

      - name: Generate Kotlin bindings
        run: |
          cargo run -p uniffi-bindgen -- generate \
            --library target/release/libspeedreading_app_core.so \
            --language kotlin \
            --out-dir android/app/src/main/java \
            --no-format \
            --config rust/uniffi.toml

      - name: Cross-compile Rust for Android ABIs
        run: |
          cargo ndk -o android/app/src/main/jniLibs -P 26 \
            -t arm64-v8a -t armeabi-v7a -t x86_64 \
            build -p speedreading-app_core --release

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: readstr-android-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
